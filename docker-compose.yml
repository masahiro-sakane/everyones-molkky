services:
  postgres:
    image: postgres:16-alpine
    container_name: molkky-postgres
    environment:
      POSTGRES_USER: molkky
      POSTGRES_PASSWORD: molkky_password
      POSTGRES_DB: molkky_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U molkky -d molkky_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
